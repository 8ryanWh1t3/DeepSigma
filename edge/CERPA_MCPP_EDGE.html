<meta charset="utf-8"/>

<title>Deep Sigma EDGE — CERPA Console v1.1.0</title>
<style>
:root{--bg:#0b0f14;--card:#111824;--card2:#0d1520;--muted:#8aa0b5;--txt:#e7eef7;--accent:#7df9ff;--warn:#ffcc66;--bad:#ff6b6b;--ok:#5dff93;--ribbon:#1a2638;--line:#1b2a3a;--glow:rgba(125,249,255,.08);--mag:#ff6bff;--step-done:#5dff93;--step-active:#7df9ff;--step-future:#3a4a5e;--c-claim:#7df9ff;--c-event:#38bdf8;--c-review:#ffcc66;--c-patch:#ff6bff;--c-apply:#5dff93;--r2p2:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;overflow-x:hidden}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.hidden{display:none!important}

/* ── Header ── */
header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;min-height:54px;background:rgba(8,12,20,.96);position:relative;z-index:100;flex-wrap:wrap}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(125,249,255,.2) 15%,rgba(255,107,255,.12) 50%,rgba(125,249,255,.2) 85%,transparent)}
.brand{white-space:nowrap;font-weight:700;letter-spacing:.5px;font-size:15px;background:linear-gradient(135deg,var(--accent),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand small{display:block;-webkit-text-fill-color:var(--muted);font-size:10px;font-weight:400;letter-spacing:.3px}
.brand.r2p2-active{background:linear-gradient(135deg,var(--r2p2),var(--warn));-webkit-background-clip:text;background-clip:text}

/* ── Mode Toggle ── */
.mode-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;flex-shrink:0}
.mode-btn{padding:4px 10px;font-size:9px;font-weight:700;letter-spacing:.4px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;text-transform:uppercase}
.mode-btn.active-mode{background:rgba(125,249,255,.12);color:var(--accent)}
.mode-btn.r2p2-on{background:rgba(249,115,22,.15);color:var(--r2p2)}

/* ── Progress Strip ── */
.progress-strip{display:flex;align-items:center;gap:0;margin:0 auto;flex-wrap:nowrap}
.ps-pill{padding:4px 12px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .25s;border:1px solid transparent;white-space:nowrap}
.ps-pill.step-future{color:var(--step-future);background:rgba(58,74,94,.12);border-color:rgba(58,74,94,.3)}
.ps-pill.step-active{color:var(--step-active);background:rgba(125,249,255,.1);border-color:rgba(125,249,255,.35);box-shadow:0 0 8px rgba(125,249,255,.15)}
.ps-pill.step-done{color:#0b0f14;background:var(--step-done);border-color:var(--step-done)}
.ps-arrow{color:#2a3a4e;font-size:8px;margin:0 3px}
.save-indicator{font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap}
.save-indicator.dirty{color:var(--warn)}

/* ── R2P2 Execution Clock ── */
.exec-clock{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:8px;border:1px solid rgba(249,115,22,.3);background:rgba(249,115,22,.06);margin-left:8px;flex-shrink:0}
.exec-clock .clock-val{font-size:14px;font-weight:700;color:var(--r2p2);font-variant-numeric:tabular-nums}
.exec-clock .clock-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.exec-clock .clock-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.clock-onpace{color:var(--ok);border:1px solid rgba(93,255,147,.3);background:rgba(93,255,147,.08)}
.clock-compressed{color:var(--warn);border:1px solid rgba(255,204,102,.3);background:rgba(255,204,102,.08)}
.clock-late{color:var(--bad);border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
.clock-executed{color:var(--ok);border:1px solid rgba(93,255,147,.3);background:rgba(93,255,147,.08)}

/* ── R2P2 6-Step Strip ── */
.r2p2-strip{display:flex;align-items:center;gap:0;flex-wrap:nowrap}
.r2p2-step{padding:4px 8px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.3px;color:var(--muted);border:1px solid rgba(249,115,22,.15);background:rgba(249,115,22,.04);white-space:nowrap;cursor:pointer;transition:all .2s}
.r2p2-step:hover{border-color:rgba(249,115,22,.4)}
.r2p2-step.r2-active{color:var(--r2p2);border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.1)}
.r2p2-step.r2-done{color:#0b0f14;background:var(--r2p2);border-color:var(--r2p2)}
.r2p2-arrow{color:#3a3020;font-size:7px;margin:0 2px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);padding:0 16px;background:rgba(11,15,20,.92);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tabs .tsep{width:1px;height:24px;background:var(--line);margin:auto 6px;flex-shrink:0}
.ttab{padding:9px 14px;font-size:10.5px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ttab:hover{color:var(--txt)}.ttab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Main ── */
.main{height:calc(100vh - 118px);overflow-y:auto;padding:16px 20px}
.main section{max-width:1440px;margin:0 auto}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:rgba(125,249,255,.12)}
.card h3{margin:0 0 10px;font-size:13px;color:#cfe2f7;letter-spacing:.4px;text-transform:uppercase}
.card h4{margin:0 0 8px;font-size:11px;color:var(--accent);letter-spacing:.4px;text-transform:uppercase}
.card.r2p2-card{border-color:rgba(249,115,22,.2)}
.card.r2p2-card:hover{border-color:rgba(249,115,22,.4)}
.card.r2p2-card h3{color:var(--r2p2)}
.card.r2p2-card h4{color:var(--r2p2)}

/* ── Grids ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;cursor:pointer;transition:all .2s}
.kpi:hover{border-color:rgba(125,249,255,.3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.kpi-green::before{background:var(--ok)}.kpi.kpi-amber::before{background:var(--warn)}.kpi.kpi-red::before{background:var(--bad)}.kpi.kpi-cyan::before{background:var(--accent)}.kpi.kpi-r2p2::before{background:var(--r2p2)}
.kpi .kv{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.kpi .kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.kv-green{color:var(--ok)}.kv-amber{color:var(--warn)}.kv-red{color:var(--bad)}.kv-cyan{color:var(--accent)}.kv-r2p2{color:var(--r2p2)}

/* ── Forms ── */
.df{margin-bottom:10px}
.df label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.df input,.df select,.df textarea{width:100%;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:11px;font-family:inherit}
.df textarea{height:80px;resize:vertical}
.df input:focus,.df select:focus,.df textarea:focus{border-color:rgba(125,249,255,.4);outline:none}
.df-readonly input,.df-readonly select,.df-readonly textarea{opacity:.55;pointer-events:none}

/* ── Buttons ── */
button{background:#182235;color:var(--txt);border:1px solid #243449;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:10.5px;transition:all .15s;font-weight:500;font-family:inherit}
button:hover{border-color:#2f4765}
button.primary{border-color:rgba(125,249,255,.35);color:var(--accent)}
button.primary:hover{background:rgba(125,249,255,.06)}
button.ok{border-color:rgba(93,255,147,.35);color:var(--ok)}
button.ok:hover{background:rgba(93,255,147,.06)}
button.danger{border-color:rgba(255,107,107,.35);color:var(--bad)}
button.danger:hover{background:rgba(255,107,107,.06)}
button.warn{border-color:rgba(255,204,102,.35);color:var(--warn)}
button.r2p2-btn{border-color:rgba(249,115,22,.35);color:var(--r2p2)}
button.r2p2-btn:hover{background:rgba(249,115,22,.06)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:11.5px}
th,td{padding:7px 8px;border-bottom:1px solid #141e2d;text-align:left;vertical-align:top}
th{color:#6b8099;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
tbody tr{transition:background .1s;cursor:default}tbody tr:hover{background:rgba(125,249,255,.03)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.3px;border:1px solid}
.b-green{color:var(--ok);border-color:rgba(93,255,147,.35);background:rgba(93,255,147,.06)}
.b-amber{color:var(--warn);border-color:rgba(255,204,102,.35);background:rgba(255,204,102,.06)}
.b-red{color:var(--bad);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.06)}
.b-cyan{color:var(--accent);border-color:rgba(125,249,255,.25);background:rgba(125,249,255,.05)}
.b-mag{color:var(--mag);border-color:rgba(255,107,255,.3);background:rgba(255,107,255,.06)}
.b-gray{color:var(--muted);border-color:rgba(138,160,181,.3);background:rgba(138,160,181,.06)}
.b-r2p2{color:var(--r2p2);border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.08)}

/* ── List items ── */
.list-items{margin:4px 0 8px}
.list-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #141e2d;font-size:11px}
.list-item:last-child{border:none}
.list-item input{flex:1;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:4px 8px;font-size:11px;font-family:inherit}
.list-item input:focus{border-color:rgba(125,249,255,.4);outline:none}
.list-item .li-rm{background:none;border:none;color:var(--bad);cursor:pointer;font-size:14px;padding:2px 4px;opacity:.6}
.list-item .li-rm:hover{opacity:1}
.list-add{font-size:10px;padding:3px 10px;margin-top:4px}

/* ── Toast ── */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:11px;font-weight:600;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);color:var(--ok)}
.toast-warn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--warn)}
.toast-info{background:rgba(125,249,255,.1);border:1px solid rgba(125,249,255,.3);color:var(--accent)}
.toast-bad{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.35);color:var(--bad)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer-panel{position:fixed;top:0;right:0;width:520px;max-width:92vw;height:100vh;background:var(--card);border-left:1px solid var(--line);z-index:510;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;display:flex;flex-direction:column}
.drawer-panel.open{transform:translateX(0)}
.drawer-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--card);z-index:10}
.drawer-hdr h3{margin:0;font-size:14px;color:var(--accent);flex:1}
.drawer-hdr .dx{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}
.drawer-body{padding:16px;flex:1;overflow-y:auto}

/* ── Confirm modal ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center}
.confirm-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;max-width:420px;width:90%;text-align:center}
.confirm-card h4{margin:0 0 10px;color:var(--txt);font-size:14px}
.confirm-card p{margin:0 0 16px;color:var(--muted);font-size:12px}
.confirm-card .confirm-btns{display:flex;gap:8px;justify-content:center}

/* ── Collapsible ── */
.collapsible-hdr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--line);margin-bottom:8px}
.collapsible-hdr h4{margin:0;flex:1}
.collapsible-hdr .chevron{color:var(--muted);font-size:10px;transition:transform .2s}
.collapsible-hdr.open .chevron{transform:rotate(90deg)}
.collapsible-body{overflow:hidden;transition:max-height .3s ease}
.collapsible-body.collapsed{max-height:0!important;overflow:hidden;padding:0!important}

/* ── Step cards ── */
.step-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:all .2s;cursor:pointer}
.step-card:hover{border-color:rgba(125,249,255,.2);transform:translateY(-1px)}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.step-card.sc-done::before{background:var(--ok)}
.step-card.sc-active::before{background:var(--accent)}
.step-card.sc-future::before{background:var(--step-future)}
.step-card .sc-num{font-size:20px;font-weight:700;color:var(--muted);margin-bottom:4px}
.step-card .sc-name{font-size:12px;font-weight:600;margin-bottom:4px}
.step-card .sc-status{font-size:9px;text-transform:uppercase;letter-spacing:.4px}

/* ── Event cards ── */
.ev-card{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.ev-card:hover{border-color:rgba(56,189,248,.3)}
.ev-card .ev-title{font-size:12px;font-weight:600}
.ev-card .ev-meta{font-size:9px;color:var(--muted);margin-top:4px}

/* ── Timeline ── */
.tl-vertical{position:relative;padding-left:30px}
.tl-line{position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--line);background:var(--bg)}
.tl-dot.tl-claim{border-color:var(--c-claim);background:var(--c-claim)}
.tl-dot.tl-event{border-color:var(--c-event);background:var(--c-event)}
.tl-dot.tl-review{border-color:var(--c-review);background:var(--c-review)}
.tl-dot.tl-patch{border-color:var(--c-patch);background:var(--c-patch)}
.tl-dot.tl-apply{border-color:var(--c-apply);background:var(--c-apply)}
.tl-dot.tl-r2p2{border-color:var(--r2p2);background:var(--r2p2)}
.tl-content{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.tl-content .tl-name{font-size:12px;font-weight:600}
.tl-content .tl-date{font-size:10px;color:var(--muted);margin-top:2px}
.tl-content .tl-cat{font-size:8px;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* ── Crosswalk ── */
.xwalk-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.xwalk-col{flex:1;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;text-align:center}
.xwalk-mcpp{background:rgba(138,160,181,.08);color:var(--muted);border:1px solid rgba(138,160,181,.2)}
.xwalk-cerpa{background:rgba(125,249,255,.06);color:var(--accent);border:1px solid rgba(125,249,255,.2)}
.xwalk-r2p2{background:rgba(249,115,22,.06);color:var(--r2p2);border:1px solid rgba(249,115,22,.2)}
.xwalk-arrow{color:var(--muted);font-size:14px;flex-shrink:0}

/* ── Packet preview ── */
.packet-preview{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:16px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;max-height:600px;overflow-y:auto}

/* ── Confidence slider ── */
.conf-slider{display:flex;align-items:center;gap:10px}
.conf-slider input[type="range"]{flex:1;accent-color:var(--accent)}
.conf-val{font-size:14px;font-weight:700;color:var(--accent);min-width:36px;text-align:center}

/* ── Progress bar ── */
.progress-bar{width:100%;height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}

/* ── Doctrine ── */
.doctrine-card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px}
.doctrine-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.doctrine-hdr:hover{background:rgba(125,249,255,.03)}
.doctrine-hdr h4{margin:0;flex:1;font-size:12px;color:var(--accent)}
.doctrine-hdr .chevron{color:var(--muted);font-size:10px;transition:transform .2s}
.doctrine-hdr.open .chevron{transform:rotate(90deg)}
.doctrine-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
.doctrine-body.open{max-height:2000px;padding:10px 14px 14px}
.doctrine-body p{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.doctrine-body ul{margin:0 0 8px 16px;font-size:11px;color:var(--muted);line-height:1.6}

/* ── Shortcut bar ── */
.shortcut-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(11,15,20,.94);border-top:1px solid var(--line);padding:4px 16px;display:flex;align-items:center;gap:14px;font-size:9px;color:var(--muted)}
.shortcut-bar kbd{display:inline-block;padding:1px 5px;border-radius:3px;background:rgba(125,249,255,.08);border:1px solid rgba(125,249,255,.15);font-family:inherit;font-size:9px;color:var(--accent);margin:0 1px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#243449;border-radius:3px}

/* ── Print ── */
@media print{
  body{background:#fff!important;color:#111!important}
  header,.tabs,.shortcut-bar,.drawer-overlay,.drawer-panel,.toast-wrap,.confirm-overlay{display:none!important}
  .main{height:auto!important;overflow:visible!important}
  .card{background:#fff!important;border:1px solid #ccc!important;color:#111!important;break-inside:avoid}
}
@media(max-width:900px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .exec-clock{display:none}
}
@media(max-width:600px){
  header{flex-direction:column;gap:8px;padding:10px}
  .progress-strip{display:none}
  .shortcut-bar{display:none}
  .drawer-panel{width:100%!important;max-width:100%!important}
  .mode-toggle{display:none}
}
</style>

<!-- ═══ HEADER ═══ -->

<!-- ═══ MAIN ═══ -->
<div class="main" id="mainArea">

<script>
/* ══════════════════════════════════════════════════════════════
   CERPA EDGE v1.1.0 + R2P2 — JavaScript
   Deep Sigma EDGE — Claim → Event → Review → Patch → Apply
   R2P2 = Rapid Response Planning Process (compressed mode)
   ══════════════════════════════════════════════════════════════ */

/* ══════════ UTILITIES ══════════ */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function setHTML(el,html){var t=document.createElement("template");t.innerHTML=html;el.textContent="";el.appendChild(t.content.cloneNode(true))}
function $(id){return document.getElementById(id)}
function showToast(msg,type){var t=document.createElement("div");t.className="toast toast-"+(type||"info");t.textContent=msg;$("toastWrap").appendChild(t);setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(function(){t.remove()},300)},2800)}
function downloadFile(content,filename,mime){var blob=new Blob([content],{type:mime||"text/plain"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast("Downloaded "+filename,"ok")}
function uid(){return "c"+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function deepClone(o){return JSON.parse(JSON.stringify(o))}
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms)}}
function fmtDate(d){if(!d)return"--";try{return new Date(d).toLocaleDateString("en-US",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}catch(e){return d}}
function pct(n,d){return d?Math.round(n/d*100):0}
function dfInput(id,label,val){return '<div class="df"><label>'+esc(label)+'</label><input id="sf-'+id+'" type="text" value="'+esc(val)+'"/></div>'}
function dfSelect(id,label,opts,val){var h='<div class="df"><label>'+esc(label)+'</label><select id="sf-'+id+'">';opts.forEach(function(o){h+='<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>'});return h+'</select></div>'}
function dfTextarea(id,label,val){return '<div class="df">'+(label?'<label>'+esc(label)+'</label>':'')+'<textarea id="sf-'+id+'">'+esc(val)+'</textarea></div>'}
function dfDate(id,label,val){return '<div class="df"><label>'+esc(label)+'</label><input id="sf-'+id+'" type="date" value="'+esc(val)+'"/></div>'}
function dfDatetime(id,label,val){return '<div class="df"><label>'+esc(label)+'</label><input id="sf-'+id+'" type="datetime-local" value="'+esc(val)+'"/></div>'}
var store={
  save:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}},
  load:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},
  remove:function(k){try{localStorage.removeItem(k)}catch(e){}},
  size:function(){try{var t=0;for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);t+=localStorage.getItem(k).length}return t}catch(e){return 0}}
};

/* ══════════ R2P2 LABEL TRANSLATION ══════════ */
var R2P2_MODE=false;
var R2P2_LABELS={
  claim:{tab:"Problem Framing",title:"Problem Framing",desc:"What is the operational problem / mission framing?"},
  event:{tab:"COA Dev Inputs",title:"COA Development Inputs",desc:"Facts, constraints, inputs, and conditions that inform options."},
  review:{tab:"Wargaming",title:"COA Wargaming",desc:"War game and structured judgment against the evidence."},
  patch:{tab:"Decision / Orders",title:"Comparison / Decision / Orders",desc:"Selected COA translated into action and orders."},
  apply:{tab:"Transition",title:"Transition",desc:"Transition to execution and validation."}
};
var CERPA_LABELS={
  claim:{tab:"Claim",title:"Claim Definition",desc:"What is being asserted, required, detected, or framed as the issue?"},
  event:{tab:"Event",title:"Event Log",desc:"What happened, what was observed, and what evidence exists?"},
  review:{tab:"Review",title:"Review Workspace",desc:"What does the evidence mean? Evaluate findings, assess confidence, and document rationale."},
  patch:{tab:"Patch",title:"Patch Definition",desc:"What change are we making in response? Define the corrective action."},
  apply:{tab:"Apply",title:"Execution & Validation",desc:"What got executed, validated, and learned?"}
};
function L(key){return R2P2_MODE?R2P2_LABELS[key]:CERPA_LABELS[key]}

function setMode(mode){
  R2P2_MODE=(mode==="r2p2");
  mutate(function(){STATE.r2p2.enabled=R2P2_MODE});
  $("modeCERPA").className="mode-btn"+(R2P2_MODE?"":" active-mode");
  $("modeR2P2").className="mode-btn"+(R2P2_MODE?" r2p2-on":"");
  var brand=$("brandTitle");
  if(R2P2_MODE){
    brand.className="brand r2p2-active";
    brand.innerHTML="R2P2 / CERPA Console";
    $("brandSub").textContent="Deep Sigma EDGE \u2014 Rapid Response Planning Process";
  }else{
    brand.className="brand";
    brand.innerHTML="CERPA Console";
    $("brandSub").textContent="Deep Sigma EDGE \u2014 Claim \u2192 Event \u2192 Review \u2192 Patch \u2192 Apply";
  }
  /* fix brand small */
  var sm=brand.querySelector("small");
  if(!sm){sm=document.createElement("small");brand.appendChild(sm)}
  sm.id="brandSub";
  sm.textContent=R2P2_MODE?"Deep Sigma EDGE \u2014 Rapid Response Planning Process":"Deep Sigma EDGE \u2014 Claim \u2192 Event \u2192 Review \u2192 Patch \u2192 Apply";

  $("tabClaim").textContent=L("claim").tab;
  $("tabEvent").textContent=L("event").tab;
  $("tabReview").textContent=L("review").tab;
  $("tabPatch").textContent=L("patch").tab;
  $("tabApply").textContent=L("apply").tab;

  $("execClock").classList.toggle("hidden",!R2P2_MODE);
  updateProgress();
  updateExecClock();
  renderTab(currentTab);
}

/* ══════════ STATE MODEL ══════════ */
var STORE_KEY="cerpa_edge_state";
var OLD_MCPP_KEY="mcpp_edge_state";

function defaultState(){
  return {
    metadata:{title:"",org:"",domain:"",owner:"",classification:"UNCLASSIFIED",created:new Date().toISOString(),updated:"",context_type:"",urgency:"normal",status:"draft"},
    claim:{id:uid(),title:"",statement:"",type:"",source:"",priority:"P3",authority:"",assumptions:[],constraints:[],success_criteria:[],tags:[]},
    events:[],
    review:{summary:"",findings:[],options_considered:[],rejected_options:[],confidence:0.5,risk_level:"medium",drift_signals:[],rationale:"",decision_basis:""},
    patch:{selected_action:"",patch_type:"",change_summary:"",owner:"",due_date:"",dependencies:[],approvals:[],blast_radius:"",rollback_plan:"",kill_switch:"",notes:""},
    apply:{execution_status:"not_started",actions:[],validation_method:"",validation_evidence:"",outcome_summary:"",lessons_observed:[],follow_on_actions:[],completed_at:""},
    memory:{packet_id:"",lineage_notes:"",prior_related_cases:[],drift_history:[],supersedes:"",superseded_by:"",retrieval_tags:[]},
    timeline:{milestones:[]},
    crosswalk:{framework:"MCPP",mappings:[]},
    r2p2:{
      enabled:false,
      execution_window_hours:6,
      mission_receipt_time:"",
      target_execution_time:"",
      commander_intent:"",
      time_constraints:[],
      parallel_planning_notes:"",
      sop_dependencies:[],
      rehearsal_notes:[],
      decision_deadlines:[],
      transition_triggers:[],
      compressed_mode_notes:""
    },
    _dirty:false,
    _lastSaved:null
  };
}
function defaultEvent(){return {id:uid(),title:"",type:"observation",source:"",timestamp:new Date().toISOString().slice(0,16),description:"",evidence:"",confidence:0.5,severity:"medium",related_claims:[],tags:[]}}
function defaultFinding(){return {id:uid(),title:"",finding_class:"supported",statement:"",evidence_links:[],risk:"medium",confidence:0.5,notes:""}}
function defaultAction(){return {id:uid(),action:"",owner:"",due:"",status:"open",done_when:"",validation:"",notes:""}}
var STATE=defaultState();

/* ══════════ TAB SYSTEM ══════════ */
var TAB_NAMES=["overview","claim","event","review","patch","apply","crosswalk","timeline","exports","doctrine","memory","packet"];
var currentTab="overview";
function setTab(name){
  currentTab=name;
  TAB_NAMES.forEach(function(t){var sec=$("tab-"+t);if(sec)sec.classList.toggle("hidden",t!==name)});
  document.querySelectorAll(".ttab").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-t")===name)});
  renderTab(name);
}
document.querySelectorAll(".ttab").forEach(function(b){b.addEventListener("click",function(){setTab(b.getAttribute("data-t"))})});

/* ══════════ CERPA PROGRESS ══════════ */
var STEP_LABELS=[
  {key:"claim",label:"Claim",tab:"claim",color:"var(--c-claim)"},
  {key:"event",label:"Event",tab:"event",color:"var(--c-event)"},
  {key:"review",label:"Review",tab:"review",color:"var(--c-review)"},
  {key:"patch",label:"Patch",tab:"patch",color:"var(--c-patch)"},
  {key:"apply",label:"Apply",tab:"apply",color:"var(--c-apply)"}
];
function cerpaProgress(){
  var p={};
  p.claim=!!(STATE.claim.title&&STATE.claim.statement);
  p.event=STATE.events.length>0&&STATE.events.some(function(e){return e.description||e.evidence});
  p.review=!!(STATE.review.summary&&STATE.review.confidence>0);
  p.patch=!!STATE.patch.selected_action;
  p.apply=STATE.apply.execution_status!=="not_started"&&(STATE.apply.actions.length>0||STATE.apply.validation_method||STATE.apply.outcome_summary);
  return p;
}
function stepsComplete(){var p=cerpaProgress();var c=0;STEP_LABELS.forEach(function(s){if(p[s.key])c++});return c}

function updateProgress(){
  var strip=$("progressStrip");
  var progress=cerpaProgress();
  var html="";
  var foundActive=false;
  STEP_LABELS.forEach(function(s,i){
    var done=progress[s.key];
    var cls="step-future";
    if(done){cls="step-done"}else if(!foundActive){cls="step-active";foundActive=true}
    var lbl=R2P2_MODE?L(s.key).tab:s.label;
    html+='<span class="ps-pill '+cls+'" data-step="'+s.tab+'">'+esc(lbl)+'</span>';
    if(i<STEP_LABELS.length-1)html+='<span class="ps-arrow">&#9654;</span>';
  });
  setHTML(strip,html);
  strip.querySelectorAll(".ps-pill").forEach(function(p){p.addEventListener("click",function(){setTab(p.getAttribute("data-step"))})});
}

/* ══════════ R2P2 EXECUTION CLOCK ══════════ */
function updateExecClock(){
  var el=$("execClock");if(!el)return;
  if(!R2P2_MODE){el.classList.add("hidden");return}
  el.classList.remove("hidden");
  var r=STATE.r2p2;
  if(!r.mission_receipt_time){
    setHTML(el,'<span class="clock-lbl">R2P2 Clock</span><span class="clock-val">--:--</span><span class="clock-badge clock-compressed">No MRT</span>');
    return;
  }
  var mrt=new Date(r.mission_receipt_time);
  var target=r.target_execution_time?new Date(r.target_execution_time):new Date(mrt.getTime()+r.execution_window_hours*3600000);
  var now=new Date();
  var elapsed=Math.max(0,now-mrt);
  var remaining=target-now;
  var totalWindow=target-mrt;
  var elapsedHrs=Math.floor(elapsed/3600000);
  var elapsedMin=Math.floor((elapsed%3600000)/60000);
  var pctUsed=totalWindow>0?Math.min(100,Math.round(elapsed/totalWindow*100)):100;

  var badge="on pace";var badgeCls="clock-onpace";
  if(remaining<=0){badge="executed";badgeCls="clock-executed"}
  else if(pctUsed>85){badge="late";badgeCls="clock-late"}
  else if(pctUsed>60){badge="compressed";badgeCls="clock-compressed"}

  var html='<span class="clock-lbl">R2P2 Elapsed</span>';
  html+='<span class="clock-val">'+elapsedHrs+'h '+String(elapsedMin).padStart(2,"0")+'m</span>';
  html+='<span class="clock-badge '+badgeCls+'">'+badge+'</span>';
  html+='<span class="clock-lbl" style="margin-left:4px">'+pctUsed+'%</span>';
  setHTML(el,html);
}
setInterval(updateExecClock,30000);

/* ══════════ AUTO-SAVE ══════════ */
function markDirty(){STATE._dirty=true;updateSaveIndicator()}
var scheduleSave=debounce(function(){doSave()},800);
function doSave(){
  var s=deepClone(STATE);s._dirty=false;s._lastSaved=new Date().toISOString();s.metadata.updated=s._lastSaved;
  if(store.save(STORE_KEY,s)){STATE._dirty=false;STATE._lastSaved=s._lastSaved;updateSaveIndicator()}
}
function loadState(){var s=store.load(STORE_KEY);if(s){STATE=s;STATE._dirty=false;if(!STATE.r2p2)STATE.r2p2=defaultState().r2p2;return true}return false}
function updateSaveIndicator(){
  var el=$("saveIndicator");
  if(STATE._dirty){el.textContent="Unsaved changes";el.className="save-indicator dirty"}
  else if(STATE._lastSaved){el.textContent="Saved "+fmtDate(STATE._lastSaved);el.className="save-indicator"}
  else{el.textContent="No changes";el.className="save-indicator"}
}
function mutate(fn){fn();markDirty();scheduleSave();updateProgress();updateExecClock()}

/* ══════════ DRAWER ══════════ */
function openDrawer(title,html){$("drawerTitle").textContent=title;setHTML($("drawerBody"),html);$("drawerOverlay").classList.add("open");$("drawerPanel").classList.add("open")}
function closeDrawer(){$("drawerOverlay").classList.remove("open");$("drawerPanel").classList.remove("open")}
$("drawerOverlay").addEventListener("click",closeDrawer);
$("drawerClose").addEventListener("click",closeDrawer);

/* ══════════ LIST HELPERS ══════════ */
function renderListItems(arr,containerId,onchange){
  var c=$(containerId);if(!c)return;
  var html="";
  arr.forEach(function(v,i){html+='<div class="list-item"><input type="text" value="'+esc(v)+'" data-idx="'+i+'"/><button class="li-rm" data-idx="'+i+'">&times;</button></div>'});
  html+='<button class="list-add primary">+ Add</button>';
  setHTML(c,html);
  c.querySelectorAll("input").forEach(function(inp){inp.addEventListener("blur",function(){var idx=parseInt(inp.getAttribute("data-idx"));if(arr[idx]!==inp.value){arr[idx]=inp.value;mutate(function(){});if(onchange)onchange()}})});
  c.querySelectorAll(".li-rm").forEach(function(btn){btn.addEventListener("click",function(){var idx=parseInt(btn.getAttribute("data-idx"));arr.splice(idx,1);mutate(function(){});if(onchange)onchange();renderListItems(arr,containerId,onchange)})});
  c.querySelector(".list-add").addEventListener("click",function(){arr.push("");mutate(function(){});if(onchange)onchange();renderListItems(arr,containerId,onchange);var inputs=c.querySelectorAll("input");if(inputs.length)inputs[inputs.length-1].focus()});
}

/* ══════════ RENDER ROUTER ══════════ */
function renderTab(name){
  switch(name){
    case"overview":renderOverview();break;case"claim":renderClaim();break;case"event":renderEvent();break;
    case"review":renderReview();break;case"patch":renderPatch();break;case"apply":renderApply();break;
    case"crosswalk":renderCrosswalk();break;case"timeline":renderTimeline();break;case"exports":renderExports();break;
    case"doctrine":renderDoctrine();break;case"memory":renderMemory();break;case"packet":renderPacket();break;
  }
}

/* ══════════ OVERVIEW ══════════ */
function renderOverview(){
  var sec=$("tab-overview");
  var prog=cerpaProgress();var done=stepsComplete();
  var nEvents=STATE.events.length;var conf=Math.round(STATE.review.confidence*100);
  var r=STATE.r2p2;

  var html='<div class="kpi-row" style="grid-template-columns:repeat(6,1fr)">';
  html+='<div class="kpi '+(done===5?"kpi-green":"kpi-cyan")+'" data-step="overview"><div class="kv '+(done===5?"kv-green":"kv-cyan")+'">'+done+'/5</div><div class="kl">CERPA Progress</div></div>';
  html+='<div class="kpi kpi-cyan" data-step="claim"><div class="kv" style="font-size:16px;color:var(--c-claim)">'+(esc(STATE.claim.title)||"--")+'</div><div class="kl">'+(R2P2_MODE?"Problem":"Claim")+'</div></div>';
  html+='<div class="kpi '+(nEvents>0?"kpi-green":"kpi-amber")+'" data-step="event"><div class="kv '+(nEvents>0?"kv-cyan":"kv-amber")+'">'+nEvents+'</div><div class="kl">'+(R2P2_MODE?"Inputs":"Events")+'</div></div>';
  html+='<div class="kpi '+(conf>=70?"kpi-green":conf>=40?"kpi-amber":"kpi-red")+'" data-step="review"><div class="kv '+(conf>=70?"kv-green":conf>=40?"kv-amber":"kv-red")+'">'+conf+'%</div><div class="kl">'+(R2P2_MODE?"Wargame Confidence":"Review Confidence")+'</div></div>';
  html+='<div class="kpi '+(prog.patch?"kpi-green":"kpi-amber")+'" data-step="patch"><div class="kv" style="font-size:14px;'+(prog.patch?"color:var(--ok)":"color:var(--muted)")+'">'+(esc(STATE.patch.selected_action)||"--")+'</div><div class="kl">'+(R2P2_MODE?"Decision":"Patch")+'</div></div>';
  html+='<div class="kpi '+(prog.apply?"kpi-green":"kpi-amber")+'" data-step="apply"><div class="kv" style="font-size:14px;'+(prog.apply?"color:var(--ok)":"color:var(--muted)")+'">'+esc(STATE.apply.execution_status.replace(/_/g," "))+'</div><div class="kl">'+(R2P2_MODE?"Transition":"Apply")+'</div></div>';
  html+='</div>';

  /* R2P2 Status Card */
  if(R2P2_MODE){
    html+='<div class="card r2p2-card"><h3>R2P2 Status</h3>';
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">';
    html+='<div style="text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Execution Window</div><div style="font-size:18px;font-weight:700;color:var(--r2p2)">'+r.execution_window_hours+'h</div></div>';
    var currentStep=STEP_LABELS.find(function(s){return!prog[s.key]});
    html+='<div style="text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Current Step</div><div style="font-size:14px;font-weight:700;color:var(--r2p2)">'+(currentStep?L(currentStep.key).tab:"Complete")+'</div></div>';
    html+='<div style="text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Cdr Intent</div><span class="badge '+(r.commander_intent?"b-green":"b-red")+'">'+(r.commander_intent?"Yes":"No")+'</span></div>';
    html+='</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';

  html+=' <strong style="color:var(--accent);margin-left:8px">Status:</strong> <span class="badge b-cyan">'+esc(STATE.metadata.status)+'</span></p>';

  STEP_LABELS.forEach(function(s,i){

  });
  html+='</div>';

  /* Health summary */
  html+='<h3 style="margin:16px 0 10px;font-size:13px;color:#cfe2f7;letter-spacing:.4px;text-transform:uppercase">Health Summary</h3>';
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">';
  var clH=prog.claim?"defined":"missing";var evL=nEvents>=3?"strong":nEvents>0?"light":"none";

  html+='<div class="card" style="text-align:center"><h4 style="color:var(--c-review)">'+(R2P2_MODE?"Wargame":"Review")+' Confidence</h4><span class="badge '+(conf>=70?"b-green":conf>=40?"b-amber":"b-red")+'">'+conf+'%</span></div>';

  html+='<div class="card" style="text-align:center"><h4>Memory</h4><span class="badge '+(memC==="partial"?"b-amber":"b-gray")+'">'+memC+'</span></div>';

    html+='<div class="tl-vertical"><div class="tl-line"></div>';
    sorted.forEach(function(m,i){
      html+='<div class="tl-item"><div class="tl-dot tl-'+(m.category||"claim")+'"></div>';

    });
    html+='</div>';
  }else{html+='<p style="color:var(--muted);font-size:11px;text-align:center;padding:20px">No milestones.</p>'}

  $("btnAutoMilestones").addEventListener("click",function(){
    var prog=cerpaProgress();
    mutate(function(){
      tl.milestones=[];var now=new Date().toISOString();
      tl.milestones.push({name:"Session Created",datetime:STATE.metadata.created||now,category:"claim"});
      if(prog.claim)tl.milestones.push({name:(R2P2_MODE?"Problem":"Claim")+" Defined",datetime:now,category:"claim"});
      if(prog.event)tl.milestones.push({name:"Evidence Collected ("+STATE.events.length+")",datetime:now,category:"event"});
      if(prog.review)tl.milestones.push({name:(R2P2_MODE?"Wargame":"Review")+" Complete",datetime:now,category:"review"});
      if(prog.patch)tl.milestones.push({name:(R2P2_MODE?"Decision":"Patch")+": "+STATE.patch.selected_action,datetime:now,category:"patch"});
      if(prog.apply)tl.milestones.push({name:(R2P2_MODE?"Transition":"Apply")+": "+STATE.apply.execution_status.replace(/_/g," "),datetime:now,category:"apply"});
    });
    showToast("Milestones generated","ok");renderTimeline();
  });
  $("btnAddMilestone").addEventListener("click",function(){
    openDrawer("Add Milestone",'<div class="df"><label>Name</label><input id="ml-name" type="text"/></div><div class="df"><label>Date/Time</label><input id="ml-dt" type="datetime-local"/></div><div class="df"><label>Category</label><select id="ml-cat"><option>claim</option><option>event</option><option>review</option><option>patch</option><option>apply</option><option>r2p2</option></select></div><button class="ok" id="btnSaveMl" style="margin-top:10px">Save</button>');
    $("btnSaveMl").addEventListener("click",function(){var n=$("ml-name").value;if(!n){showToast("Name required","warn");return}mutate(function(){tl.milestones.push({name:n,datetime:$("ml-dt").value||new Date().toISOString(),category:$("ml-cat").value})});closeDrawer();showToast("Added","ok");renderTimeline()});
  });
  var r2btn=$("btnR2P2Timeline");
  if(r2btn)r2btn.addEventListener("click",function(){
    var mrt=STATE.r2p2.mission_receipt_time?new Date(STATE.r2p2.mission_receipt_time):new Date();
    mutate(function(){
      var steps=[{h:0,n:"Mission Receipt"},{h:1,n:"Problem Framing"},{h:2,n:"COA Development"},{h:3,n:"Wargaming"},{h:4,n:"Decision"},{h:5,n:"Orders"},{h:6,n:"Transition / Execution"}];
      steps.forEach(function(s){tl.milestones.push({name:"R2P2: "+s.n,datetime:new Date(mrt.getTime()+s.h*3600000).toISOString(),category:"r2p2"})});
    });
    showToast("R2P2 timeline generated","ok");renderTimeline();
  });
  sec.querySelectorAll("[data-rmml]").forEach(function(b){b.addEventListener("click",function(){mutate(function(){tl.milestones.splice(parseInt(b.getAttribute("data-rmml")),1)});renderTimeline()})});
}

function buildPacket(){return {metadata:deepClone(STATE.metadata),claim:deepClone(STATE.claim),events:deepClone(STATE.events),review:deepClone(STATE.review),patch:deepClone(STATE.patch),apply:deepClone(STATE.apply),memory:deepClone(STATE.memory),generated:new Date().toISOString()}}

function buildExecSummary(includeR2P2){
  var txt="";
  if(includeR2P2){
    txt+="R2P2 / CERPA EXECUTIVE SUMMARY\n"+("=".repeat(50))+"\n\n";
    var r=STATE.r2p2;
    txt+="RAPID RESPONSE PLANNING PROCESS\n";
    txt+="Execution Window: "+r.execution_window_hours+" hours\n";
    if(r.mission_receipt_time)txt+="Mission Receipt: "+fmtDate(r.mission_receipt_time)+"\n";
    if(r.target_execution_time)txt+="Target Execution: "+fmtDate(r.target_execution_time)+"\n";
    if(r.commander_intent)txt+="Commander Intent: "+r.commander_intent+"\n";
    txt+="\nCompressed Timeline:\n  H+0 Mission Receipt\n  H+1 Problem Framing\n  H+2 COA Development\n  H+3 Wargaming\n  H+4 Decision\n  H+5 Orders\n  H+6 Transition\n";
    txt+="\n"+("-".repeat(50))+"\n\n";
  }else{
    txt+="CERPA EXECUTIVE SUMMARY\n"+("=".repeat(50))+"\n\n";
  }
  txt+="Title: "+(STATE.metadata.title||STATE.claim.title||"Untitled")+"\nOrg: "+(STATE.metadata.org||"N/A")+"\nClassification: "+STATE.metadata.classification+"\nStatus: "+STATE.metadata.status+"\nGenerated: "+new Date().toISOString()+"\n\n";
  txt+=(includeR2P2?"PROBLEM FRAMING":"CLAIM")+"\n"+("-".repeat(30))+"\n";
  txt+="Title: "+STATE.claim.title+"\nPriority: "+STATE.claim.priority+"\nStatement: "+STATE.claim.statement+"\n\n";
  txt+=(includeR2P2?"KEY INPUTS":"EVENTS")+" ("+STATE.events.length+")\n"+("-".repeat(30))+"\n";
  STATE.events.forEach(function(e,i){txt+="  "+(i+1)+". "+e.title+" ["+e.severity+"] — "+e.type+"\n"});
  txt+="\n"+(includeR2P2?"WARGAME":"REVIEW")+"\n"+("-".repeat(30))+"\n";
  txt+="Confidence: "+Math.round(STATE.review.confidence*100)+"%\nRisk: "+STATE.review.risk_level+"\nSummary: "+STATE.review.summary+"\n\n";
  txt+=(includeR2P2?"DECISION / ORDERS":"PATCH")+"\n"+("-".repeat(30))+"\n";
  txt+="Action: "+STATE.patch.selected_action+"\nType: "+STATE.patch.patch_type+"\nOwner: "+STATE.patch.owner+"\n\n";
  txt+=(includeR2P2?"TRANSITION":"APPLY")+"\n"+("-".repeat(30))+"\n";
  txt+="Status: "+STATE.apply.execution_status+"\nActions: "+STATE.apply.actions.length+"\n";
  STATE.apply.actions.forEach(function(a,i){txt+="  "+(i+1)+". "+a.action+" ["+a.status+"]\n"});
  txt+="\nPROGRESS\n"+("-".repeat(30))+"\n";
  var prog=cerpaProgress();
  STEP_LABELS.forEach(function(s){txt+="  "+(includeR2P2?L(s.key).tab:s.label)+": "+(prog[s.key]?"COMPLETE":"INCOMPLETE")+"\n"});
  return txt;
}

/* ══════════ DOCTRINE TAB ══════════ */
var DOCTRINE=[
  {title:"C — Claim",body:"<p><strong style='color:var(--c-claim)'>What is being asserted, required, detected, or framed as the issue?</strong></p><p>The Claim step defines the central assertion, hypothesis, directive, or detected condition. In R2P2 mode, this maps to <strong style='color:var(--r2p2)'>Problem Framing</strong> — the operational problem or mission framing.</p><ul><li>Define a clear, actionable claim statement</li><li>Identify source and authority</li><li>Set priority and constraints</li><li>Capture assumptions that could invalidate the claim</li></ul>"},
  {title:"E — Event",body:"<p><strong style='color:var(--c-event)'>What happened, what was observed, and what evidence exists?</strong></p><p>Events are the evidence layer. In R2P2 mode, this maps to <strong style='color:var(--r2p2)'>COA Development Inputs</strong> — facts, constraints, and conditions that inform options.</p><ul><li>Capture multiple events with structured metadata</li><li>Rate confidence and severity</li><li>Link evidence directly to the claim</li></ul>"},
  {title:"R — Review",body:"<p><strong style='color:var(--c-review)'>What does the evidence mean?</strong></p><p>Review is the analytical step. In R2P2 mode, this maps to <strong style='color:var(--r2p2)'>COA Wargaming</strong> — structured judgment and stress-testing.</p><ul><li>Classify findings as supported, refuted, or inconclusive</li><li>Consider and reject alternatives with reasoning</li><li>Identify drift signals</li><li>Document the decision basis</li></ul>"},
  {title:"P — Patch",body:"<p><strong style='color:var(--c-patch)'>What change are we making in response?</strong></p><p>In R2P2 mode, Patch absorbs both <strong style='color:var(--r2p2)'>Decision</strong> and <strong style='color:var(--r2p2)'>Orders Development</strong> — the selected COA translated into action and the execution concept.</p><ul><li>Select and classify the action</li><li>Assess blast radius and rollback</li><li>Assign ownership and deadlines</li><li>Define kill switch for rapid reversal</li></ul>"},
  {title:"A — Apply",body:"<p><strong style='color:var(--c-apply)'>What got executed, validated, and learned?</strong></p><p>In R2P2 mode, Apply absorbs <strong style='color:var(--r2p2)'>Transition</strong> — the handoff to execution, validation, and lessons capture.</p><ul><li>Track execution status and actions</li><li>Define and execute validation</li><li>Capture lessons observed</li><li>Identify follow-on actions</li></ul>"},
  {title:"R2P2 — Rapid Response Planning Process",body:"<p><strong style='color:var(--r2p2)'>R2P2 is a compressed planning method for time-constrained response.</strong></p><p>It relies on disciplined prebuilt structure, not ad hoc speed. The purpose is to maximize time available for preparation and execution.</p><p>R2P2 compresses six planning steps into a target execution window (default 6 hours):</p><ol style='margin:8px 0 8px 20px;font-size:11px;color:var(--muted);line-height:1.8'><li>Problem Framing → Claim</li><li>COA Development → Event</li><li>COA Wargaming → Review</li><li>COA Comparison & Decision → Patch</li><li>Orders Development → Patch</li><li>Transition → Apply</li></ol><p>Key principles: parallel planning, SOP dependency, rehearsal discipline, commander intent prominence, transition urgency, execution clock awareness.</p><p style='margin-top:8px'><strong style='color:var(--txt)'>CERPA captures the reasoning, evidence, judgment, and applied change inside that compressed cycle. Together they create speed + memory.</strong></p>"},
  {title:"CERPA vs. MCPP",body:"<p>CERPA is evidence-first and correction-oriented. MCPP is mission-oriented and sequential. Use MCPP when planning operations. Use CERPA when responding to claims, correcting drift, or building institutional memory. R2P2 bridges both — compressed military planning speed with CERPA's traceable decision record.</p><ul><li>Problem Framing → Claim</li><li>COA Development → Event</li><li>COA Wargaming → Review</li><li>Decision / Orders → Patch</li><li>Transition → Apply</li></ul>"},
  {title:"Evidence-First Thinking",body:"<p>CERPA begins with observation, not intent. The claim is tested against events, not the other way around. Most institutional failures are failures to observe, validate, or correct — not failures to plan.</p>"},
  {title:"Traceability & Memory",body:"<p>Every CERPA cycle produces a traceable packet connecting claim → evidence → assessment → correction → validation. The Memory layer ensures future cycles reference prior decisions and detect drift patterns over time.</p>"},
  {title:"Correction Over Planning",body:"<p>CERPA privileges correction over prediction. Rather than anticipating all futures, CERPA assumes reality will deviate and builds the correction cycle into the operating model. This makes it suited for complex adaptive systems where the environment changes faster than plans can be updated.</p>"}
];

/* ══════════ SEARCH ══════════ */
function globalSearch(query){
  if(!query)return[];var q=query.toLowerCase();var results=[];
  function chk(t,s,tab){if(t&&String(t).toLowerCase().includes(q))results.push({text:String(t).substring(0,100),source:s,tab:tab})}
  chk(STATE.claim.title,"Claim Title","claim");chk(STATE.claim.statement,"Claim Statement","claim");
  STATE.events.forEach(function(e,i){chk(e.title,"Event "+(i+1),"event");chk(e.description,"Event "+(i+1)+" Desc","event");chk(e.evidence,"Event "+(i+1)+" Evidence","event")});
  STATE.review.findings.forEach(function(f,i){chk(f.title,"Finding "+(i+1),"review");chk(f.statement,"Finding "+(i+1),"review")});
  chk(STATE.review.summary,"Review Summary","review");chk(STATE.patch.selected_action,"Patch Action","patch");chk(STATE.patch.change_summary,"Patch Summary","patch");
  STATE.apply.actions.forEach(function(a,i){chk(a.action,"Action "+(i+1),"apply")});chk(STATE.apply.outcome_summary,"Outcome","apply");
  chk(STATE.memory.lineage_notes,"Memory","memory");chk(STATE.r2p2.commander_intent,"Cdr Intent","claim");
  return results;
}

/* ══════════ MCPP MIGRATION ══════════ */
function migrateMCPP(old){
  STATE=defaultState();
  STATE.metadata.title=old.metadata.op_name||"";STATE.metadata.org=old.metadata.unit||"";STATE.metadata.owner=old.metadata.planner||"";
  STATE.metadata.classification=old.metadata.classification||"UNCLASSIFIED";STATE.metadata.created=old.metadata.created||new Date().toISOString();STATE.metadata.context_type="migrated_from_mcpp";STATE.metadata.status="migrated";
  if(old.problem_framing){STATE.claim.statement=old.problem_framing.problem_statement||"";STATE.claim.title=old.metadata.op_name||"Migrated";STATE.claim.source=old.problem_framing.operational_approach||"";if(old.problem_framing.governing_factors)STATE.claim.constraints=old.problem_framing.governing_factors.slice();if(old.problem_framing.information_gaps)STATE.claim.assumptions=old.problem_framing.information_gaps.slice()}
  if(old.mission_setup){if(!STATE.claim.statement)STATE.claim.statement=old.mission_setup.mission_statement||"";STATE.r2p2.commander_intent=old.mission_setup.commander_intent||""}
  if(old.coas)old.coas.forEach(function(coa){var ev=defaultEvent();ev.title="COA: "+coa.name;ev.type="observation";ev.description=coa.concept||coa.summary||"";ev.evidence="Advantages: "+(coa.advantages||[]).join("; ");STATE.events.push(ev)});
  if(old.decision){var sc=old.coas?old.coas.find(function(c){return c.id===old.decision.selected_coa_id}):null;STATE.review.summary="Decision: "+(sc?sc.name:"N/A");STATE.review.rationale=old.decision.rationale||"";STATE.review.confidence=0.6}
  if(old.orders){STATE.patch.selected_action=old.orders.mission_text||"";STATE.patch.change_summary=old.orders.execution_concept||"";STATE.patch.owner=old.metadata.planner||""}
  if(old.transition){STATE.apply.execution_status="in_progress";old.transition.tasks.forEach(function(t){var a=defaultAction();a.action=t.name;a.owner=t.assigned;a.due=t.suspense;a.status=t.status==="ready"?"done":"open";STATE.apply.actions.push(a)})}
  STATE.memory.lineage_notes="Migrated from MCPP. Original: "+(old.metadata.op_name||"Unknown");
  doSave();
}

/* ══════════ KEYBOARD SHORTCUTS ══════════ */
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
  var key=e.key;
  if(key>="1"&&key<="9"){var idx=parseInt(key)-1;if(idx<TAB_NAMES.length){e.preventDefault();setTab(TAB_NAMES[idx])}}
  if(key==="0"){e.preventDefault();setTab(TAB_NAMES[9])}
  if(key==="-"){e.preventDefault();if(TAB_NAMES[10])setTab(TAB_NAMES[10])}
  if(key==="="){e.preventDefault();if(TAB_NAMES[11])setTab(TAB_NAMES[11])}
  if(key==="Escape")closeDrawer();
  if(key==="?"){e.preventDefault();setTab("doctrine")}
  if(key==="r"||key==="R"){e.preventDefault();setMode(R2P2_MODE?"cerpa":"r2p2");showToast(R2P2_MODE?"R2P2 Mode":"CERPA Mode","info")}
  if(key==="/"){
    e.preventDefault();
    openDrawer("Search",'<div class="df"><label>Search all CERPA data</label><input id="globalSearchInput" type="text" placeholder="Type to search..." autofocus/></div><div id="searchResults"></div>');
    var si=$("globalSearchInput");
    si.addEventListener("input",function(){
      var res=globalSearch(si.value);var html="";
      if(!si.value)html='<p style="font-size:10px;color:var(--muted)">Start typing...</p>';
      else if(!res.length)html='<p style="font-size:10px;color:var(--muted)">No results.</p>';
      else res.slice(0,20).forEach(function(r){html+='<div class="ev-card" data-searchtab="'+r.tab+'" style="cursor:pointer"><div class="ev-title">'+esc(r.source)+'</div><div class="ev-meta">'+esc(r.text)+'</div></div>'});

      $("searchResults").querySelectorAll("[data-searchtab]").forEach(function(c){c.addEventListener("click",function(){closeDrawer();setTab(c.getAttribute("data-searchtab"))})});

});

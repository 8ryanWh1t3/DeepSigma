<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Deep Sigma EDGE — MCPP v1.0.0</title>
<style>
:root{--bg:#0b0f14;--card:#111824;--card2:#0d1520;--muted:#8aa0b5;--txt:#e7eef7;--accent:#7df9ff;--warn:#ffcc66;--bad:#ff6b6b;--ok:#5dff93;--ribbon:#1a2638;--line:#1b2a3a;--glow:rgba(125,249,255,.08);--mag:#ff6bff;--step-done:#5dff93;--step-active:#7df9ff;--step-future:#3a4a5e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;overflow-x:hidden}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.hidden{display:none!important}

/* ── Header ── */
header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;min-height:54px;background:rgba(8,12,20,.96);position:relative;z-index:100;flex-wrap:wrap}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(125,249,255,.2) 15%,rgba(255,107,255,.12) 50%,rgba(125,249,255,.2) 85%,transparent)}
.brand{white-space:nowrap;font-weight:700;letter-spacing:.5px;font-size:15px;background:linear-gradient(135deg,var(--accent),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand small{display:block;-webkit-text-fill-color:var(--muted);font-size:10px;font-weight:400;letter-spacing:.3px}

/* ── Progress Strip ── */
.progress-strip{display:flex;align-items:center;gap:0;margin:0 auto;flex-wrap:nowrap}
.ps-pill{padding:4px 12px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .25s;border:1px solid transparent;white-space:nowrap}
.ps-pill.step-future{color:var(--step-future);background:rgba(58,74,94,.12);border-color:rgba(58,74,94,.3)}
.ps-pill.step-active{color:var(--step-active);background:rgba(125,249,255,.1);border-color:rgba(125,249,255,.35);box-shadow:0 0 8px rgba(125,249,255,.15)}
.ps-pill.step-done{color:#0b0f14;background:var(--step-done);border-color:var(--step-done)}
.ps-arrow{color:#2a3a4e;font-size:8px;margin:0 3px}
.save-indicator{font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap}
.save-indicator.dirty{color:var(--warn)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);padding:0 16px;background:rgba(11,15,20,.92);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tabs .tsep{width:1px;height:24px;background:var(--line);margin:auto 6px;flex-shrink:0}
.ttab{padding:9px 14px;font-size:10.5px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ttab:hover{color:var(--txt)}.ttab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Main ── */
.main{height:calc(100vh - 118px);overflow-y:auto;padding:16px 20px}
.main section{max-width:1440px;margin:0 auto}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:rgba(125,249,255,.12)}
.card h3{margin:0 0 10px;font-size:13px;color:#cfe2f7;letter-spacing:.4px;text-transform:uppercase}
.card h4{margin:0 0 8px;font-size:11px;color:var(--accent);letter-spacing:.4px;text-transform:uppercase}

/* ── Grids ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;cursor:pointer;transition:all .2s}
.kpi:hover{border-color:rgba(125,249,255,.3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.kpi-green::before{background:var(--ok)}.kpi.kpi-amber::before{background:var(--warn)}.kpi.kpi-red::before{background:var(--bad)}.kpi.kpi-cyan::before{background:var(--accent)}
.kpi .kv{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.kpi .kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.kv-green{color:var(--ok)}.kv-amber{color:var(--warn)}.kv-red{color:var(--bad)}.kv-cyan{color:var(--accent)}

/* ── Forms ── */
.df{margin-bottom:10px}
.df label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.df input,.df select,.df textarea{width:100%;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:11px;font-family:inherit}
.df textarea{height:80px;resize:vertical}
.df input:focus,.df select:focus,.df textarea:focus{border-color:rgba(125,249,255,.4);outline:none}
.df-readonly input,.df-readonly select,.df-readonly textarea{opacity:.55;pointer-events:none}

/* ── Buttons ── */
button{background:#182235;color:var(--txt);border:1px solid #243449;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:10.5px;transition:all .15s;font-weight:500;font-family:inherit}
button:hover{border-color:#2f4765}
button.primary{border-color:rgba(125,249,255,.35);color:var(--accent)}
button.primary:hover{background:rgba(125,249,255,.06)}
button.ok{border-color:rgba(93,255,147,.35);color:var(--ok)}
button.ok:hover{background:rgba(93,255,147,.06)}
button.danger{border-color:rgba(255,107,107,.35);color:var(--bad)}
button.danger:hover{background:rgba(255,107,107,.06)}
button.warn{border-color:rgba(255,204,102,.35);color:var(--warn)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:11.5px}
th,td{padding:7px 8px;border-bottom:1px solid #141e2d;text-align:left;vertical-align:top}
th{color:#6b8099;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
tbody tr{transition:background .1s;cursor:default}tbody tr:hover{background:rgba(125,249,255,.03)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.3px;border:1px solid}
.b-green{color:var(--ok);border-color:rgba(93,255,147,.35);background:rgba(93,255,147,.06)}
.b-amber{color:var(--warn);border-color:rgba(255,204,102,.35);background:rgba(255,204,102,.06)}
.b-red{color:var(--bad);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.06)}
.b-cyan{color:var(--accent);border-color:rgba(125,249,255,.25);background:rgba(125,249,255,.05)}
.b-gray{color:var(--muted);border-color:rgba(138,160,181,.3);background:rgba(138,160,181,.06)}

/* ── List items (add/remove pattern) ── */
.list-items{margin:4px 0 8px}
.list-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #141e2d;font-size:11px}
.list-item:last-child{border:none}
.list-item input{flex:1;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:4px 8px;font-size:11px;font-family:inherit}
.list-item input:focus{border-color:rgba(125,249,255,.4);outline:none}
.list-item .li-rm{background:none;border:none;color:var(--bad);cursor:pointer;font-size:14px;padding:2px 4px;opacity:.6}
.list-item .li-rm:hover{opacity:1}
.list-add{font-size:10px;padding:3px 10px;margin-top:4px}

/* ── Toast ── */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:11px;font-weight:600;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);color:var(--ok)}
.toast-warn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--warn)}
.toast-info{background:rgba(125,249,255,.1);border:1px solid rgba(125,249,255,.3);color:var(--accent)}
.toast-bad{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.35);color:var(--bad)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer-panel{position:fixed;top:0;right:0;width:520px;max-width:92vw;height:100vh;background:var(--card);border-left:1px solid var(--line);z-index:510;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;display:flex;flex-direction:column}
.drawer-panel.open{transform:translateX(0)}
.drawer-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--card);z-index:10}
.drawer-hdr h3{margin:0;font-size:14px;color:var(--accent);flex:1}
.drawer-hdr .dx{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}
.drawer-body{padding:16px;flex:1;overflow-y:auto}

/* ── Confirm modal ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center}
.confirm-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:24px;max-width:420px;width:90%;text-align:center}
.confirm-card h4{margin:0 0 10px;color:var(--txt);font-size:14px}
.confirm-card p{margin:0 0 16px;color:var(--muted);font-size:12px}
.confirm-card .confirm-btns{display:flex;gap:8px;justify-content:center}

/* ── Collapsible sections ── */
.collapsible-hdr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--line);margin-bottom:8px}
.collapsible-hdr h4{margin:0;flex:1}
.collapsible-hdr .chevron{color:var(--muted);font-size:10px;transition:transform .2s}
.collapsible-hdr.open .chevron{transform:rotate(90deg)}
.collapsible-body{overflow:hidden;transition:max-height .3s ease}
.collapsible-body.collapsed{max-height:0!important;overflow:hidden;padding:0!important}

/* ── Status cards ── */
.step-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:all .2s;cursor:pointer}
.step-card:hover{border-color:rgba(125,249,255,.2);transform:translateY(-1px)}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.step-card.sc-done::before{background:var(--ok)}
.step-card.sc-active::before{background:var(--accent)}
.step-card.sc-future::before{background:var(--step-future)}
.step-card .sc-num{font-size:20px;font-weight:700;color:var(--muted);margin-bottom:4px}
.step-card .sc-name{font-size:12px;font-weight:600;margin-bottom:4px}
.step-card .sc-status{font-size:9px;text-transform:uppercase;letter-spacing:.4px}

/* ── COA panels ── */
.coa-list{display:flex;flex-direction:column;gap:8px}
.coa-card{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s}
.coa-card:hover{border-color:rgba(125,249,255,.2)}
.coa-card.selected{border-color:var(--accent);background:rgba(125,249,255,.04)}
.coa-card .cc-name{font-size:12px;font-weight:600}
.coa-card .cc-status{margin-top:4px}
.coa-actions{display:flex;gap:4px;margin-top:6px}
.two-panel{display:grid;grid-template-columns:280px 1fr;gap:14px}

/* ── Wargame matrix ── */
.wg-matrix{width:100%;border-collapse:collapse}
.wg-matrix th{background:var(--card2);position:sticky;top:0}
.wg-matrix td{vertical-align:top}
.wg-matrix textarea{width:100%;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:4px 6px;font-size:10px;height:50px;resize:vertical;font-family:inherit}
.wg-matrix textarea:focus{border-color:rgba(125,249,255,.4);outline:none}

/* ── Radar chart ── */
.radar-wrap{display:flex;justify-content:center;margin:16px 0}

/* ── Scoring grid ── */
.score-grid{width:100%;border-collapse:collapse}
.score-grid th{font-size:8px;padding:4px 6px}
.score-grid td{padding:4px 6px;text-align:center}
.score-grid input[type="range"]{width:60px;accent-color:var(--accent)}
.score-val{font-size:11px;font-weight:700;color:var(--accent);min-width:20px;display:inline-block;text-align:center}

/* ── Timeline ── */
.tl-vertical{position:relative;padding-left:30px}
.tl-line{position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--line);background:var(--bg)}
.tl-dot.tl-planning{border-color:#a78bfa;background:#a78bfa}
.tl-dot.tl-execution{border-color:var(--accent);background:var(--accent)}
.tl-dot.tl-logistics{border-color:var(--warn);background:var(--warn)}
.tl-content{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.tl-content .tl-name{font-size:12px;font-weight:600}
.tl-content .tl-date{font-size:10px;color:var(--muted);margin-top:2px}
.tl-content .tl-cat{font-size:8px;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* ── Order preview ── */
.order-preview{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:16px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;max-height:600px;overflow-y:auto}

/* ── Transition progress ── */
.progress-bar{width:100%;height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--ok);border-radius:4px;transition:width .3s}

/* ── Checklist ── */
.checklist-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #141e2d;font-size:11px}
.checklist-item input[type="checkbox"]{accent-color:var(--accent)}

/* ── Doctrine ── */
.doctrine-card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px}
.doctrine-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.doctrine-hdr:hover{background:rgba(125,249,255,.03)}
.doctrine-hdr h4{margin:0;flex:1;font-size:12px;color:var(--accent)}
.doctrine-hdr .chevron{color:var(--muted);font-size:10px;transition:transform .2s}
.doctrine-hdr.open .chevron{transform:rotate(90deg)}
.doctrine-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
.doctrine-body.open{max-height:2000px;padding:10px 14px 14px}
.doctrine-body p{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.doctrine-body ul{margin:0 0 8px 16px;font-size:11px;color:var(--muted);line-height:1.6}

/* ── Shortcut bar ── */
.shortcut-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(11,15,20,.94);border-top:1px solid var(--line);padding:4px 16px;display:flex;align-items:center;gap:14px;font-size:9px;color:var(--muted)}
.shortcut-bar kbd{display:inline-block;padding:1px 5px;border-radius:3px;background:rgba(125,249,255,.08);border:1px solid rgba(125,249,255,.15);font-family:inherit;font-size:9px;color:var(--accent);margin:0 1px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#243449;border-radius:3px}

/* ── Print ── */
@media print{
  body{background:#fff!important;color:#111!important}
  header,.tabs,.shortcut-bar,.drawer-overlay,.drawer-panel,.toast-wrap,.confirm-overlay{display:none!important}
  .main{height:auto!important;overflow:visible!important}
  .card{background:#fff!important;border:1px solid #ccc!important;color:#111!important;break-inside:avoid}
}
/* ── Responsive ── */
@media(max-width:900px){
  .two-panel{grid-template-columns:1fr}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  header{flex-direction:column;gap:8px;padding:10px}
  .progress-strip{display:none}
  .shortcut-bar{display:none}
  .drawer-panel{width:100%!important;max-width:100%!important}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="brand">MCPP Console<small>Deep Sigma EDGE &mdash; Marine Corps Planning Process v1.0.0</small></div>
  <div class="progress-strip" id="progressStrip"></div>
  <div class="save-indicator" id="saveIndicator">No changes</div>
</header>

<!-- ═══ TABS ═══ -->
<nav class="tabs" id="tabBar">
  <button class="ttab active" data-t="overview">Overview</button>
  <button class="ttab" data-t="setup">Mission Setup</button>
  <span class="tsep"></span>
  <button class="ttab" data-t="framing">Problem Framing</button>
  <button class="ttab" data-t="coadev">COA Dev</button>
  <button class="ttab" data-t="wargame">Wargaming</button>
  <button class="ttab" data-t="compare">COA Compare</button>
  <button class="ttab" data-t="decision">Decision</button>
  <button class="ttab" data-t="orders">Orders</button>
  <span class="tsep"></span>
  <button class="ttab" data-t="transition">Transition</button>
  <button class="ttab" data-t="timeline">Timeline</button>
  <span class="tsep"></span>
  <button class="ttab" data-t="exports">Exports</button>
  <button class="ttab" data-t="doctrine">Doctrine</button>
</nav>

<!-- ═══ MAIN ═══ -->
<div class="main" id="mainArea">

  <!-- TAB: Overview -->
  <section id="tab-overview"></section>

  <!-- TAB: Mission Setup -->
  <section id="tab-setup" class="hidden"></section>

  <!-- TAB: Problem Framing -->
  <section id="tab-framing" class="hidden"></section>

  <!-- TAB: COA Dev -->
  <section id="tab-coadev" class="hidden"></section>

  <!-- TAB: Wargaming -->
  <section id="tab-wargame" class="hidden"></section>

  <!-- TAB: COA Compare -->
  <section id="tab-compare" class="hidden"></section>

  <!-- TAB: Decision -->
  <section id="tab-decision" class="hidden"></section>

  <!-- TAB: Orders -->
  <section id="tab-orders" class="hidden"></section>

  <!-- TAB: Transition -->
  <section id="tab-transition" class="hidden"></section>

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

  setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(function(){t.remove()},300)},2800);
}
function downloadFile(content,filename,mime){
  var blob=new Blob([content],{type:mime||"text/plain"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Downloaded "+filename,"ok");
}

    var done=STATE.progress[s.key];
    var cls="step-future";
    if(done){cls="step-done"}
    else if(!foundActive){cls="step-active";foundActive=true}
    html+='<span class="ps-pill '+cls+'" data-step="'+s.tab+'">'+esc(s.label)+'</span>';
    if(i<STEP_LABELS.length-1)html+='<span class="ps-arrow">&#9654;</span>';
  });
  setHTML(strip,html);
  strip.querySelectorAll(".ps-pill").forEach(function(p){
    p.addEventListener("click",function(){setTab(p.getAttribute("data-step"))});
  });
}

/* ══════════ SECTION 5: AUTO-SAVE ══════════ */
function markDirty(){STATE._dirty=true;updateSaveIndicator()}
var scheduleSave=debounce(function(){doSave()},800);
function doSave(){
  var s=deepClone(STATE);s._dirty=false;s._lastSaved=new Date().toISOString();
  if(store.save(STORE_KEY,s)){STATE._dirty=false;STATE._lastSaved=s._lastSaved;updateSaveIndicator()}
}
function loadState(){
  var s=store.load(STORE_KEY);
  if(s){STATE=s;STATE._dirty=false;return true}
  return false;
}
function updateSaveIndicator(){
  var el=$("saveIndicator");
  if(STATE._dirty){el.textContent="Unsaved changes";el.className="save-indicator dirty"}
  else if(STATE._lastSaved){el.textContent="Saved "+fmtDate(STATE._lastSaved);el.className="save-indicator"}
  else{el.textContent="No changes";el.className="save-indicator"}
}
function mutate(fn){fn();markDirty();scheduleSave();updateProgress()}

/* ══════════ SECTION 7: LIST HELPERS ══════════ */
function renderListItems(arr,containerId,onchange){
  var c=$(containerId);if(!c)return;
  var html="";
  arr.forEach(function(v,i){
    html+='<div class="list-item"><input type="text" value="'+esc(v)+'" data-idx="'+i+'"/><button class="li-rm" data-idx="'+i+'">&times;</button></div>';
  });
  html+='<button class="list-add primary">+ Add</button>';
  setHTML(c,html);
  c.querySelectorAll("input").forEach(function(inp){
    inp.addEventListener("blur",function(){
      var idx=parseInt(inp.getAttribute("data-idx"));
      if(arr[idx]!==inp.value){arr[idx]=inp.value;mutate(function(){});if(onchange)onchange()}
    });
  });
  c.querySelectorAll(".li-rm").forEach(function(btn){
    btn.addEventListener("click",function(){
      var idx=parseInt(btn.getAttribute("data-idx"));
      arr.splice(idx,1);mutate(function(){});if(onchange)onchange();
      renderListItems(arr,containerId,onchange);
    });
  });
  c.querySelector(".list-add").addEventListener("click",function(){
    arr.push("");mutate(function(){});if(onchange)onchange();
    renderListItems(arr,containerId,onchange);
    var inputs=c.querySelectorAll("input");
    if(inputs.length)inputs[inputs.length-1].focus();
  });
}

/* ══════════ SECTION 14: COA COMPARISON + RADAR ══════════ */
var CRITERIA=["feasibility","acceptability","suitability","distinguishability","completeness","risk","tempo","sustainability"];
var CRITERIA_LABELS=["Feasibility","Acceptability","Suitability","Distinguish.","Completeness","Risk","Tempo","Sustain."];
var CRITERIA_WEIGHTS={};
CRITERIA.forEach(function(c){CRITERIA_WEIGHTS[c]=1});
var COA_COLORS=["#7df9ff","#ff6bff","#5dff93","#ffcc66","#a78bfa","#ff6b6b","#38bdf8","#f97316"];

function renderCompare(){
  var sec=$("tab-compare");
  if(!STATE.coas.length){
    setHTML(sec,'<div class="card"><h3>COA Comparison</h3><p style="font-size:11px;color:var(--muted)">No COAs available. Develop COAs first.</p></div>');return;
  }
  var html='<div class="card"><h3>Criterion Weights</h3><div class="grid4">';
  CRITERIA.forEach(function(c,i){
    var w=CRITERIA_WEIGHTS[c]||1;
    html+='<div class="df"><label>'+CRITERIA_LABELS[i]+' (x'+w+')</label><input type="range" min="1" max="3" value="'+w+'" data-wt="'+c+'" style="width:100%;accent-color:var(--accent)"/></div>';
  });
  html+='</div></div>';

  html+='<div class="card"><h3>Scoring Grid</h3><div style="overflow-x:auto"><table class="score-grid"><thead><tr><th>COA</th>';
  CRITERIA_LABELS.forEach(function(l){html+='<th>'+l+'</th>'});
  html+='<th>Weighted Total</th></tr></thead><tbody>';
  STATE.coas.forEach(function(coa,ci){
    html+='<tr><td style="font-weight:600;color:'+COA_COLORS[ci%COA_COLORS.length]+'">'+esc(coa.name||"COA "+(ci+1))+'</td>';
    CRITERIA.forEach(function(cr){
      var v=coa.comparison_scores[cr]||5;
      html+='<td><input type="range" min="1" max="10" value="'+v+'" data-coa="'+coa.id+'" data-cr="'+cr+'"/><span class="score-val">'+v+'</span></td>';
    });
    var total=calcWeightedTotal(coa);
    html+='<td style="font-weight:700;font-size:14px;color:var(--accent)">'+total.toFixed(1)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  html+='<div class="card"><h3>Radar Chart</h3><div class="radar-wrap" id="radarWrap"></div>';
  html+='<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">';
  STATE.coas.forEach(function(coa,ci){
    html+='<span style="font-size:10px;font-weight:600;color:'+COA_COLORS[ci%COA_COLORS.length]+'">&#9632; '+esc(coa.name||"COA "+(ci+1))+'</span>';
  });
  html+='</div></div>';

  html+='<div class="card"><h3>Ranking</h3><div id="rankList"></div></div>';

  html+='<div class="card"><h3>Rationale Notes</h3>';
  STATE.coas.forEach(function(coa,ci){
    html+='<div class="df"><label style="color:'+COA_COLORS[ci%COA_COLORS.length]+'">'+esc(coa.name||"COA "+(ci+1))+'</label><textarea id="rat-'+coa.id+'">'+esc(coa.rationale||"")+'</textarea></div>';
  });
  html+='</div>';

  if(!STATE.progress.compare){
    html+='<div style="margin-top:14px;text-align:center"><button class="ok" id="btnCompareDone">Mark Comparison Complete &#10003;</button></div>';
  }

  setHTML(sec,html);

  sec.querySelectorAll("[data-wt]").forEach(function(r){
    r.addEventListener("input",function(){CRITERIA_WEIGHTS[r.getAttribute("data-wt")]=parseInt(r.value);renderCompare()});
  });
  sec.querySelectorAll("[data-coa]").forEach(function(r){
    r.addEventListener("input",function(){
      var coaId=r.getAttribute("data-coa");var cr=r.getAttribute("data-cr");var v=parseInt(r.value);
      var c=STATE.coas.find(function(x){return x.id===coaId});
      if(c){mutate(function(){c.comparison_scores[cr]=v});r.nextElementSibling.textContent=v;updateRadar();updateRanking()}
    });
  });
  STATE.coas.forEach(function(coa){
    var el=$("rat-"+coa.id);if(el)el.addEventListener("blur",function(){mutate(function(){coa.rationale=el.value})});
  });

  renderRadarChart();
  updateRanking();

  var btnCD=$("btnCompareDone");
  if(btnCD)btnCD.addEventListener("click",function(){mutate(function(){STATE.progress.compare=true});showToast("Comparison complete","ok");renderCompare()});
}

function calcWeightedTotal(coa){
  var sum=0;var wsum=0;
  CRITERIA.forEach(function(cr){var w=CRITERIA_WEIGHTS[cr]||1;sum+=((coa.comparison_scores[cr]||5)*w);wsum+=w});
  return wsum?sum/wsum*10/10:0;
}

function renderRadarChart(){
  var wrap=$("radarWrap");if(!wrap)return;
  var W=400,H=400,cx=200,cy=200,R=150;
  var n=CRITERIA.length;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="360" height="360" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">';

  for(var ring=2;ring<=10;ring+=2){
    var rr=R*ring/10;var pts=[];
    for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;pts.push((cx+rr*Math.cos(a)).toFixed(1)+","+(cy+rr*Math.sin(a)).toFixed(1))}
    svg+='<polygon points="'+pts.join(" ")+'" fill="none" stroke="#1b2a3a" stroke-width="1"/>';
  }
  for(var i=0;i<n;i++){
    var a=Math.PI*2*i/n-Math.PI/2;
    var ex=(cx+R*Math.cos(a)).toFixed(1);var ey=(cy+R*Math.sin(a)).toFixed(1);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ex+'" y2="'+ey+'" stroke="#1b2a3a" stroke-width="1"/>';
    var lx=(cx+(R+18)*Math.cos(a)).toFixed(1);var ly=(cy+(R+18)*Math.sin(a)).toFixed(1);
    svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="#8aa0b5" font-size="8" font-weight="600">'+CRITERIA_LABELS[i]+'</text>';
  }

  STATE.coas.forEach(function(coa,ci){
    var pts=[];
    for(var i=0;i<n;i++){
      var v=(coa.comparison_scores[CRITERIA[i]]||5)/10;
      var a=Math.PI*2*i/n-Math.PI/2;
      pts.push((cx+R*v*Math.cos(a)).toFixed(1)+","+(cy+R*v*Math.sin(a)).toFixed(1));
    }
    var col=COA_COLORS[ci%COA_COLORS.length];
    svg+='<polygon points="'+pts.join(" ")+'" fill="'+col+'" fill-opacity="0.1" stroke="'+col+'" stroke-width="2"/>';
    for(var i=0;i<n;i++){
      var v=(coa.comparison_scores[CRITERIA[i]]||5)/10;
      var a=Math.PI*2*i/n-Math.PI/2;
      svg+='<circle cx="'+(cx+R*v*Math.cos(a)).toFixed(1)+'" cy="'+(cy+R*v*Math.sin(a)).toFixed(1)+'" r="3" fill="'+col+'"/>';
    }
  });

  svg+='</svg>';
  setHTML(wrap,svg);
}
function updateRadar(){renderRadarChart()}

function updateRanking(){
  var el=$("rankList");if(!el)return;
  var ranked=STATE.coas.slice().sort(function(a,b){return calcWeightedTotal(b)-calcWeightedTotal(a)});
  var html='';
  ranked.forEach(function(c,i){
    var ci=STATE.coas.indexOf(c);
    var col=COA_COLORS[ci%COA_COLORS.length];
    html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #141e2d">';
    html+='<span style="font-size:16px;font-weight:700;color:var(--muted);width:24px">#'+(i+1)+'</span>';
    html+='<span style="font-size:12px;font-weight:600;color:'+col+';flex:1">'+esc(c.name||"COA "+(ci+1))+'</span>';
    html+='<span style="font-size:14px;font-weight:700;color:var(--accent)">'+calcWeightedTotal(c).toFixed(1)+'</span>';
    html+='</div>';
  });
  setHTML(el,html);
}

    mutate(function(){d.locked=false;STATE.progress.decision=false});showToast("Decision unlocked","warn");renderDecision();

function collapsibleSection(id,title,contentFn){
  var h='<div class="card" id="'+id+'-wrap">';
  h+='<div class="collapsible-hdr open" id="'+id+'-hdr"><h4>'+title+'</h4><span class="chevron">&#9654;</span></div>';
  h+='<div class="collapsible-body" id="'+id+'-body">'+contentFn()+'</div>';
  h+='</div>';
  return h;
}

function bindOrderFields(){
  var o=STATE.orders;
  var binds=[
    ["ord-sit-enemy","situation_enemy"],["ord-sit-friendly","situation_friendly"],["ord-sit-attach","situation_attachments"],
    ["ord-mission","mission_text"],["ord-exec-intent","execution_intent"],["ord-exec-concept","execution_concept"],
    ["ord-coord","coordinating_instructions"],["ord-admin-supply","admin_supply"],["ord-admin-transport","admin_transport"],
    ["ord-admin-medical","admin_medical"],["ord-cmd-rel","command_relationships"],["ord-cmd-sig","command_signal"]
  ];
  binds.forEach(function(b){
    var el=$("sf-"+b[0]);if(!el)return;
    el.addEventListener("blur",function(){mutate(function(){o[b[1]]=el.value})});
  });
  document.querySelectorAll("#tab-orders .collapsible-hdr").forEach(function(hdr){
    hdr.addEventListener("click",function(){
      hdr.classList.toggle("open");
      var body=hdr.nextElementSibling;
      if(body)body.classList.toggle("collapsed");
    });
  });
}

function renderOrderTasks(){

  tasks.forEach(function(t,i){
    html+='<div class="card" style="padding:10px;margin-bottom:6px"><div class="grid2">';

    html+=dfInput("ot-purpose-"+i,"Purpose",t.purpose);
    html+=dfInput("ot-priority-"+i,"Priority",t.priority);

  });

/* ══════════ SECTION 17: TRANSITION ══════════ */
function renderTransition(){
  var sec=$("tab-transition");var tr=STATE.transition;

  var tasksDone=tr.tasks.filter(function(t){return t.status==="ready"}).length;
  var tasksPct=tr.tasks.length?Math.round(tasksDone/tr.tasks.length*100):0;
  var checkDone=tr.checklist.filter(function(c){return c.done}).length;

  var html='<div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">';
  html+='<div class="kpi kpi-cyan"><div class="kv kv-cyan">'+tr.tasks.length+'</div><div class="kl">Transition Tasks</div></div>';
  html+='<div class="kpi '+(tasksPct===100?"kpi-green":"kpi-amber")+'"><div class="kv '+(tasksPct===100?"kv-green":"kv-amber")+'">'+tasksPct+'%</div><div class="kl">Task Readiness</div></div>';
  html+='<div class="kpi '+(checkDone===tr.checklist.length?"kpi-green":"kpi-amber")+'"><div class="kv '+(checkDone===tr.checklist.length?"kv-green":"kv-amber")+'">'+checkDone+'/'+tr.checklist.length+'</div><div class="kl">Checklist Items</div></div>';
  html+='</div>';

  html+='<div class="card"><h3>Task Tracker</h3>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:'+tasksPct+'%"></div></div>';
  html+='<table><thead><tr><th>Task</th><th>Assigned To</th><th>Suspense</th><th>Status</th><th>Notes</th><th></th></tr></thead><tbody id="trTaskBody">';
  tr.tasks.forEach(function(t,i){
    var stCls=t.status==="ready"?"b-green":t.status==="partial"?"b-amber":"b-red";
    html+='<tr><td><input type="text" value="'+esc(t.name)+'" data-tri="'+i+'" data-trf="name" style="background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-size:10px;width:100%"/></td>';
    html+='<td><input type="text" value="'+esc(t.assigned)+'" data-tri="'+i+'" data-trf="assigned" style="background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-size:10px;width:100%"/></td>';
    html+='<td><input type="date" value="'+esc(t.suspense)+'" data-tri="'+i+'" data-trf="suspense" style="background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-size:10px"/></td>';
    html+='<td><select data-tri="'+i+'" data-trf="status" style="background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-size:10px">';
    ["not ready","partial","ready"].forEach(function(s){html+='<option'+(t.status===s?' selected':'')+'>'+s+'</option>'});
    html+='</select></td>';
    html+='<td><input type="text" value="'+esc(t.notes)+'" data-tri="'+i+'" data-trf="notes" style="background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-size:10px;width:100%"/></td>';
    html+='<td><button class="danger" data-rmtr="'+i+'" style="padding:2px 6px;font-size:10px">&times;</button></td></tr>';
  });
  html+='</tbody></table>';
  html+='<button class="primary" id="btnAddTrTask" style="margin-top:8px">+ Add Task</button></div>';

  html+='<div class="card"><h3>Transition Checklist</h3>';
  tr.checklist.forEach(function(c,i){
    html+='<div class="checklist-item"><input type="checkbox" data-chi="'+i+'"'+(c.done?' checked':'')+'/><span>'+esc(c.text)+'</span></div>';
  });
  html+='</div>';

  html+='<div class="grid2">';
  html+='<div class="card"><h4>Decision Support Matrix</h4><div id="tr-ls-dsm"></div></div>';
  html+='<div class="card"><h4>CCIR Monitoring</h4><div id="tr-ls-ccir"></div></div>';
  html+='</div>';

  setHTML(sec,html);

  sec.querySelectorAll("[data-tri]").forEach(function(el){
    var handler=function(){
      var i=parseInt(el.getAttribute("data-tri"));var f=el.getAttribute("data-trf");
      mutate(function(){tr.tasks[i][f]=el.value});
      if(f==="status")renderTransition();
    };
    if(el.tagName==="SELECT")el.addEventListener("change",handler);
    else el.addEventListener("blur",handler);
  });
  sec.querySelectorAll("[data-rmtr]").forEach(function(b){
    b.addEventListener("click",function(){var i=parseInt(b.getAttribute("data-rmtr"));mutate(function(){tr.tasks.splice(i,1)});renderTransition()});
  });
  $("btnAddTrTask").addEventListener("click",function(){
    mutate(function(){tr.tasks.push({name:"",assigned:"",suspense:"",status:"not ready",notes:""})});renderTransition();

  sec.querySelectorAll("[data-chi]").forEach(function(cb){
    cb.addEventListener("change",function(){var i=parseInt(cb.getAttribute("data-chi"));mutate(function(){tr.checklist[i].done=cb.checked});renderTransition()});
  });
  renderListItems(tr.dsm,"tr-ls-dsm");
  renderListItems(tr.ccir_monitor,"tr-ls-ccir");
}

/* ══════════ SECTION 18: TIMELINE ══════════ */
function renderTimeline(){
  var sec=$("tab-timeline");var tl=STATE.timeline;
  var html='<div class="card"><h3>Planning Timeline</h3>';
  html+='<button class="primary" id="btnAutoMilestones" style="margin-bottom:10px">Auto-Generate from State</button>';
  html+=' <button class="primary" id="btnAddMilestone">+ Add Milestone</button>';
  html+='</div>';

  if(tl.milestones.length){
    var sorted=tl.milestones.slice().sort(function(a,b){return(a.datetime||"").localeCompare(b.datetime||"")});
    html+='<div class="tl-vertical"><div class="tl-line"></div>';
    sorted.forEach(function(m,i){
      var catCls="tl-"+(m.category||"planning");
      html+='<div class="tl-item"><div class="tl-dot '+catCls+'"></div>';
      html+='<div class="tl-content"><div class="tl-name">'+esc(m.name)+'</div>';
      html+='<div class="tl-date">'+fmtDate(m.datetime)+'</div>';
      html+='<div class="tl-cat" style="color:var(--muted)">'+esc(m.category||"planning")+'</div>';
      html+='<button class="danger" data-rmml="'+i+'" style="margin-top:4px;font-size:9px;padding:2px 6px">&times;</button>';
      html+='</div></div>';
    });
    html+='</div>';
  }else{
    html+='<p style="color:var(--muted);font-size:11px;text-align:center;padding:20px">No milestones. Click Auto-Generate or + Add Milestone.</p>';
  }

  setHTML(sec,html);

  $("btnAutoMilestones").addEventListener("click",function(){
    mutate(function(){
      tl.milestones=[];
      var now=new Date().toISOString();
      tl.milestones.push({name:"Planning Start",datetime:now,category:"planning"});
      if(STATE.metadata.op_name)tl.milestones.push({name:"WARNO Issued",datetime:now,category:"planning"});
      if(STATE.progress.framing)tl.milestones.push({name:"Problem Framing Complete",datetime:now,category:"planning"});
      if(STATE.progress.coadev)tl.milestones.push({name:"COA Development Complete",datetime:now,category:"planning"});
      if(STATE.progress.wargame)tl.milestones.push({name:"Wargaming Complete",datetime:now,category:"planning"});
      if(STATE.progress.compare)tl.milestones.push({name:"COA Comparison Complete",datetime:now,category:"planning"});
      if(STATE.progress.decision)tl.milestones.push({name:"Decision Brief",datetime:now,category:"execution"});
      if(STATE.progress.orders)tl.milestones.push({name:"OPORD Issued",datetime:now,category:"execution"});
      STATE.transition.tasks.forEach(function(t){
        if(t.suspense)tl.milestones.push({name:t.name||"Task Suspense",datetime:t.suspense+"T00:00:00",category:"logistics"});
      });
    });
    showToast("Milestones auto-generated","ok");renderTimeline();
  });

  $("btnAddMilestone").addEventListener("click",function(){
    openDrawer("Add Milestone",'<div class="df"><label>Name</label><input id="ml-name" type="text"/></div><div class="df"><label>Date/Time</label><input id="ml-dt" type="datetime-local"/></div><div class="df"><label>Category</label><select id="ml-cat"><option>planning</option><option>execution</option><option>logistics</option></select></div><button class="ok" id="btnSaveMl" style="margin-top:10px">Save</button>');
    $("btnSaveMl").addEventListener("click",function(){
      var name=$("ml-name").value;var dt=$("ml-dt").value;var cat=$("ml-cat").value;
      if(!name){showToast("Name required","warn");return}
      mutate(function(){tl.milestones.push({name:name,datetime:dt||new Date().toISOString(),category:cat})});
      closeDrawer();showToast("Milestone added","ok");renderTimeline();
    });
  });

  sec.querySelectorAll("[data-rmml]").forEach(function(b){
    b.addEventListener("click",function(){var i=parseInt(b.getAttribute("data-rmml"));mutate(function(){tl.milestones.splice(i,1)});renderTimeline()});
  });
}

function renderExports(){
  var sec=$("tab-exports");
  var storageKB=(store.size()/1024).toFixed(1);
  var html='<div class="card"><h3>Session Management</h3>';
  html+='<p style="font-size:11px;color:var(--muted);margin-bottom:10px">Last saved: '+(STATE._lastSaved?fmtDate(STATE._lastSaved):"Never")+' &middot; Storage: '+storageKB+' KB</p>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<button class="primary" id="btnSaveNow">Save Now</button>';
  html+='<button id="btnLoadStorage">Load from Storage</button>';
  html+='<button class="danger" id="btnResetAll">Reset All</button>';
  html+='</div></div>';

  html+='<div class="card"><h3>Export</h3><div style="display:flex;gap:8px;flex-wrap:wrap">';
  html+='<button class="primary" id="btnExportJSON">Export Full JSON</button>';
  html+='<button id="btnExportOPORD">Export OPORD (TXT)</button>';
  html+='<button id="btnExportSummary">Export Summary (TXT)</button>';
  html+='<button id="btnExportCompCSV">Export COA Comparison (CSV)</button>';
  html+='<button id="btnExportTransCSV">Export Transition Tasks (CSV)</button>';
  html+='</div></div>';

  html+='<div class="card"><h3>Import</h3>';
  html+='<p style="font-size:11px;color:var(--muted);margin-bottom:8px">Import a previously exported JSON file to restore state.</p>';
  html+='<input type="file" id="importFile" accept=".json" style="font-size:11px;color:var(--muted)"/>';
  html+='</div>';

  setHTML(sec,html);

  $("btnSaveNow").addEventListener("click",function(){doSave();showToast("Saved","ok");renderExports()});
  $("btnLoadStorage").addEventListener("click",function(){if(loadState()){showToast("State loaded","ok");updateProgress();renderTab(currentTab)}else{showToast("No saved state found","warn")}});
  $("btnResetAll").addEventListener("click",function(){
    var overlay=document.createElement("div");overlay.className="confirm-overlay";
    overlay.innerHTML='<div class="confirm-card"><h4>Reset All Data?</h4><p>This will permanently delete all planning data. This cannot be undone.</p><div class="confirm-btns"><button class="danger" id="confirmReset">Reset Everything</button><button id="cancelReset">Cancel</button></div></div>';
    document.body.appendChild(overlay);
    document.getElementById("confirmReset").addEventListener("click",function(){
      STATE=defaultState();store.remove(STORE_KEY);selectedCOA=null;
      overlay.remove();showToast("All data reset","warn");updateProgress();updateSaveIndicator();setTab("overview");
    });
    document.getElementById("cancelReset").addEventListener("click",function(){overlay.remove()});
  });

  $("btnExportJSON").addEventListener("click",function(){
    var s=deepClone(STATE);delete s._dirty;
    downloadFile(JSON.stringify(s,null,2),(STATE.metadata.op_name||"mcpp")+"_export.json","application/json");
  });
  $("btnExportOPORD").addEventListener("click",function(){
    if(!STATE.orders.preview){generateOrderPreview()}
    downloadFile(STATE.orders.preview||"No order generated",(STATE.metadata.op_name||"mcpp")+"_OPORD.txt","text/plain");
  });
  $("btnExportSummary").addEventListener("click",function(){
    var txt="MCPP PLANNING SUMMARY\n"+("=".repeat(40))+"\n\n";
    txt+="Operation: "+STATE.metadata.op_name+"\nUnit: "+STATE.metadata.unit+"\nClassification: "+STATE.metadata.classification+"\n\n";
    txt+="MISSION: "+STATE.mission_setup.mission_statement+"\n\n";
    txt+="INTENT: "+STATE.mission_setup.commander_intent+"\n\n";
    txt+="PROBLEM STATEMENT: "+STATE.problem_framing.problem_statement+"\n\n";
    txt+="END STATE: "+STATE.problem_framing.desired_end_state+"\n\n";
    txt+="COAs DEVELOPED: "+STATE.coas.length+"\n";
    STATE.coas.forEach(function(c,i){txt+="  COA "+(i+1)+": "+c.name+" (Score: "+calcWeightedTotal(c).toFixed(1)+")\n"});
    var selCoa=STATE.decision.selected_coa_id?STATE.coas.find(function(x){return x.id===STATE.decision.selected_coa_id}):null;
    if(selCoa)txt+="\nSELECTED: "+selCoa.name+"\nRATIONALE: "+STATE.decision.rationale+"\n";
    txt+="\nPROGRESS:\n";
    STEP_LABELS.forEach(function(s){txt+="  "+s.label+": "+(STATE.progress[s.key]?"COMPLETE":"INCOMPLETE")+"\n"});
    downloadFile(txt,(STATE.metadata.op_name||"mcpp")+"_summary.txt","text/plain");
  });
  $("btnExportCompCSV").addEventListener("click",function(){
    var csv="COA,"+CRITERIA_LABELS.join(",")+",Weighted Total\n";
    STATE.coas.forEach(function(c){
      csv+='"'+c.name+'"';
      CRITERIA.forEach(function(cr){csv+=","+(c.comparison_scores[cr]||5)});
      csv+=","+calcWeightedTotal(c).toFixed(1)+"\n";
    });
    downloadFile(csv,(STATE.metadata.op_name||"mcpp")+"_comparison.csv","text/csv");
  });
  $("btnExportTransCSV").addEventListener("click",function(){
    var csv="Task,Assigned To,Suspense,Status,Notes\n";
    STATE.transition.tasks.forEach(function(t){csv+='"'+t.name+'","'+t.assigned+'","'+t.suspense+'","'+t.status+'","'+t.notes+'"\n'});
    downloadFile(csv,(STATE.metadata.op_name||"mcpp")+"_transition.csv","text/csv");
  });

  $("importFile").addEventListener("change",function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.metadata||!data.progress){showToast("Invalid MCPP export file","bad");return}
        STATE=data;STATE._dirty=false;
        doSave();showToast("State imported successfully","ok");updateProgress();setTab("overview");
      }catch(err){showToast("Invalid JSON file","bad")}
    };
    reader.readAsText(file);
  });
}

  {title:"Step 3: COA Wargaming",body:"<p>Wargaming is a disciplined process of visualizing the interaction of friendly and enemy forces. It identifies strengths and weaknesses of each COA.</p><ul><li>Use action-reaction-counteraction methodology</li><li>Identify decision points, critical events, and CCIRs</li><li>Refine COAs based on wargame results</li><li>Identify requirements for support</li><li>Document results in a synchronization matrix</li></ul>"},
  {title:"Step 4: COA Comparison & Decision",body:"<p>The staff compares COAs against evaluation criteria and presents findings to the commander. The commander selects a COA or modifies one for further development.</p><ul><li>Analyze each COA against criteria (feasibility, acceptability, suitability, etc.)</li><li>Weight criteria based on commander's guidance</li><li>Compare COAs and identify advantages/disadvantages</li><li>Present the decision brief</li><li>Commander selects or modifies a COA</li></ul>"},
  {title:"Step 5: Orders Development",body:"<p>The staff converts the selected COA into a complete operations order using the 5-paragraph format.</p><ul><li>Prepare the OPORD: Situation, Mission, Execution, Admin & Logistics, Command & Signal</li><li>Develop annexes and appendices as needed</li><li>Conduct an orders crosswalk</li><li>Reconcile the plan with available resources</li></ul>"},
  {title:"Step 6: Transition",body:"<p>Transition bridges planning and execution. The staff ensures subordinate units understand the order and are prepared to execute.</p><ul><li>Brief subordinate commanders</li><li>Issue warning orders and operations orders</li><li>Conduct rehearsals and backbriefs</li><li>Verify readiness of subordinate units</li><li>Establish monitoring and assessment criteria</li></ul>"},
  {title:"Commander-Driven Planning",body:"<p>MCPP is commander-driven. The commander's intent, guidance, and decisions drive each step. The staff supports the commander by developing information, analyzing options, and recommending decisions.</p>"},
  {title:"Iterative Planning",body:"<p>MCPP is iterative, not purely sequential. As new information emerges, the staff may revisit earlier steps. Planning continues throughout execution as the situation evolves.</p>"},
  {title:"Rapid Planning",body:"<p>When time is limited, steps can be compressed or conducted concurrently. The commander may abbreviate the process, focusing on the most critical decisions. Problem framing and COA development may be combined; wargaming may be limited to the most dangerous enemy COA.</p>"}
];
function renderDoctrine(){
  var sec=$("tab-doctrine");
  var html='<div class="df"><label>Search Doctrine</label><input id="docSearch" type="text" placeholder="Type to filter..."/></div>';
  DOCTRINE.forEach(function(d,i){
    html+='<div class="doctrine-card" data-doci="'+i+'">';
    html+='<div class="doctrine-hdr" data-doci="'+i+'"><h4>'+esc(d.title)+'</h4><span class="chevron">&#9654;</span></div>';
    html+='<div class="doctrine-body">'+d.body+'</div></div>';
  });
  setHTML(sec,html);
  sec.querySelectorAll(".doctrine-hdr").forEach(function(hdr){
    hdr.addEventListener("click",function(){
      hdr.classList.toggle("open");
      var body=hdr.nextElementSibling;body.classList.toggle("open");
    });
  });
  $("docSearch").addEventListener("input",function(){
    var q=this.value.toLowerCase();
    sec.querySelectorAll(".doctrine-card").forEach(function(card){
      var idx=parseInt(card.getAttribute("data-doci"));
      var d=DOCTRINE[idx];
      var match=!q||d.title.toLowerCase().includes(q)||d.body.toLowerCase().includes(q);
      card.style.display=match?"":"none";
    });
  });
}

/* ══════════ SECTION 21: KEYBOARD SHORTCUTS ══════════ */
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
  var key=e.key;
  if(key>="1"&&key<="9"){var idx=parseInt(key)-1;if(idx<TAB_NAMES.length){e.preventDefault();setTab(TAB_NAMES[idx])}}
  if(key==="0"){e.preventDefault();setTab(TAB_NAMES[9])}
  if(key==="Escape"){closeDrawer()}
  if(key==="?"){e.preventDefault();setTab("doctrine")}
});

/* ══════════ SECTION 22: INIT ══════════ */
function initApp(){
  var loaded=loadState();
  if(loaded)showToast("Session restored","ok");
  updateProgress();
  updateSaveIndicator();
  setTab("overview");
}
document.addEventListener("DOMContentLoaded",initApp);

</script>
